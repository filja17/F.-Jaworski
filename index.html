<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F. Jaworski</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/journey.css">
  <link rel="stylesheet" href="css/subpages.css">
  <link rel="stylesheet" href="css/album.css">
  <style>
    /* ── INTRO SECTION — normal scroll block, not fixed ── */
    #intro-section {
      position: relative;
      z-index: 2; /* musi być WYŻEJ niż #journey (z-index:1), inaczej
                     fixed tło #frame potrafi wyrenderować się nad
                     wideo/tekstem intro — to był główny powód "znikania" */
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    #intro-video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.38;
      pointer-events: none;
    }
    #intro-word {
      position: relative;
      z-index: 2;
      font-size: clamp(5rem, 13vw, 14rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--white);
      text-align: center;
      padding: 0 5vw;
      line-height: 1;
      opacity: 1;
      transition: opacity 0.12s ease;
    }
    #intro-word.flash-out { opacity: 0; }
    #intro-label {
      position: absolute;
      bottom: 2.5rem;
      right: 3rem;
      z-index: 2;
      font-size: clamp(1rem, 2vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(240,237,232,0.35);
    }

    /* ── ALBUMS DIVIDER ── */
    #albums-section {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0 5vw;
      position: relative;
      z-index: 2; /* to samo co #intro-section — nad #journey */
      flex-shrink: 0;
    }
    #albums-title {
      font-size: clamp(5rem, 16vw, 18rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 0.85;
      color: var(--white);
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.23,1,0.32,1);
      user-select: none;
    }
    #albums-title.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- fixed-look background, positioned via JS (see journey.js) — 
       nie używamy natywnego position:fixed, bo iOS Safari potrafi go
       błędnie przerysować podczas scrolla (miganie / "znikanie" treści) -->
  <div id="frame">
    <div id="bg-stack"></div>
    <div id="text-shield"></div>
    <div id="bg-veil"></div>
  </div>

  <!-- nav -->
  <nav id="nav">
    <ul class="nav-links">
      <li><a href="#" data-page="projects">Projekty</a></li>
      <li><a href="#" data-page="gallery">Serie</a></li>
      <li><a href="#" data-page="ebru">Marmurkowanie</a></li>
      <li><a href="#" data-page="about">O mnie</a></li>
      <li><a href="#" data-page="contact">Kontakt</a></li>
    </ul>
    <button class="nav-burger" id="nav-burger" aria-label="menu">
      <span></span><span></span>
    </button>
  </nav>

  <!-- mobile drawer -->
  <div id="nav-drawer">
    <button class="drawer-close" id="drawer-close">zamknij</button>
    <a href="#" data-page="projects">Projekty</a>
    <a href="#" data-page="gallery">Serie</a>
    <a href="#" data-page="ebru">Marmurkowanie</a>
    <a href="#" data-page="about">O mnie</a>
    <a href="#" data-page="contact">Kontakt</a>
  </div>

  <!-- intro — scrollable section, NOT fixed -->
  <div id="intro-section">
    <video id="intro-video" autoplay loop muted playsinline webkit-playsinline preload="auto">
      <source src="assets/back.mp4" type="video/mp4">
    </video>
    <div id="intro-word"></div>
    <div id="intro-label">portfolio</div>
  </div>

  <!-- albums divider -->
  <div id="albums-section">
    <div id="albums-title">Albumy</div>
  </div>

  <!-- scroll journey — sekcje (.js-title / .js-content) dokładane tu przez journey.js -->
  <div id="journey"></div>

  <!-- overlay -->
  <div id="overlay">
    <div id="overlay-inner">
      <button id="overlay-close">zamknij</button>
      <div id="overlay-content"></div>
    </div>
  </div>

  <!-- lightbox — scroll-snap strip -->
  <div id="lightbox">
    <button id="lightbox-close">zamknij</button>
    <div id="lb-strip"></div>
    <button class="lb-nav" id="lb-prev">←</button>
    <button class="lb-nav" id="lb-next">→</button>
    <div id="lightbox-counter"></div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/journey.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/subpages.js"></script>
  <script>
    (function() {
      /* iOS Safari czasem ignoruje/zatrzymuje autoplay (np. po przełączeniu
         karty, wygaszeniu ekranu, low power mode) — wymuszamy .play()
         ręcznie i ponawiamy przy powrocie do karty. */
      const introVideo = document.getElementById('intro-video');
      function tryPlayVideo() {
        if (!introVideo) return;
        introVideo.muted = true;
        const p = introVideo.play();
        if (p !== undefined) p.catch(() => {});
      }
      tryPlayVideo();
      document.addEventListener('visibilitychange', () => { if (!document.hidden) tryPlayVideo(); });
      window.addEventListener('pageshow', tryPlayVideo);

      const words = ['F. Jaworski', 'Szelest', 'Nota Contra Notam', 'Among Other Sounds'];
      const el    = document.getElementById('intro-word');
      let i = 0;
      const SHOW_MS = 700;

      el.textContent = words[0];

      function tick() {
        el.classList.add('flash-out');
        setTimeout(() => {
          i = (i + 1) % words.length;
          el.textContent = words[i];
          el.classList.remove('flash-out');
          setTimeout(tick, SHOW_MS);
        }, 130);
      }
      setTimeout(tick, SHOW_MS);

      /* albums title fade-in on scroll */
      const albumsTitle = document.getElementById('albums-title');
      const observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) albumsTitle.classList.add('visible');
      }, { threshold: 0.15 });
      observer.observe(document.getElementById('albums-section'));
    })();
  </script>
</body>
</html>
